name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build keyboard APK
        run: ./gradlew :keyboard:assembleDebug

      - name: Build companion APK
        run: ./gradlew :companion:assembleDebug

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload keyboard APK
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-debug
          path: keyboard/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload companion APK
        uses: actions/upload-artifact@v4
        with:
          name: companion-debug
          path: companion/build/outputs/apk/debug/*.apk
          retention-days: 14
